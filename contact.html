<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joey Don · Let's Work Together</title>
  <meta name="description" content="Get in touch with Joey Don for UGC brand deals and content collaborations.">
  <meta property="og:title" content="Joey Don · Let's Work Together" />
  <meta property="og:description" content="Get in touch for UGC brand deals and content collaborations." />
  <meta property="og:image" content="https://joeydon.com/public/images/joey_don_1.jpg" />
  <meta property="og:url" content="https://joeydon.com/contact.html" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="public/style.css">
</head>
<body>

  <!-- ── NAV ── -->
  <nav></nav>

  <!-- ── CONTACT ── -->
  <div class="contact-section" id="contact">
    <div class="contact-inner">
      <div class="contact-left">
        <div class="section-label" style="color:rgba(255,255,255,0.4);">Get in touch</div>
        <h2>Let's make something<br><span>they can't ignore.</span></h2>
        <p>Ready to create content your audience actually wants to watch? Drop me a message and let's talk rates, deliverables, and timelines.</p>
        <div class="contact-email">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
          <a href="mailto:iamjoeydon@gmail.com">iamjoeydon@gmail.com</a>
        </div>
        <a href="index.html" class="back-link">← Back to portfolio</a>
      </div>
      <div class="contact-right">
        <form id="contact-form" action="https://formspree.io/f/xreyveoa" method="POST">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your brand, what you need, and timeline..." rows="5" required></textarea>
          </div>
          <button type="submit" class="form-submit">Send message →</button>
          <div class="form-success" id="form-success">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
            Message sent! I'll get back to you soon.
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer></footer>

  <script src="public/components.js"></script>
  <script>
    const form = document.getElementById('contact-form');
    const success = document.getElementById('form-success');
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (res.ok) {
        form.reset();
        success.classList.add('visible');
        setTimeout(() => success.classList.remove('visible'), 5000);
      }
    });
  </script>

</body>
</html>
